<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Домашка 4Б</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f1a; --surface: #141628; --card: #1a1d35; --border: #2a2d50;
    --text: #e8eaf6; --muted: #6b7194;
    --math:#4f8ef7; --rus:#e05c7a; --lit:#f7a94f; --eng:#4fc9f7; --okr:#6be07a;
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif;
    min-height: 100vh; padding: 40px 16px 80px;
    background-image:
      radial-gradient(ellipse 60% 40% at 15% 10%, rgba(79,142,247,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 80%, rgba(224,92,122,0.07) 0%, transparent 60%);
  }
  .wrap { max-width: 700px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 40px; }
  .badge {
    display: inline-block; background: var(--border); color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; padding: 4px 14px; border-radius: 100px; margin-bottom: 14px;
  }
  header h1 { font-size: clamp(24px,5vw,40px); font-weight: 900; letter-spacing: -1px; }
  #hw-date { margin-top: 8px; font-size: 15px; color: var(--muted); font-weight: 700; }
  .empty-state { text-align: center; color: var(--muted); font-size: 15px; margin-top: 60px; }

  .subject-card {
    border: 1px solid var(--border); border-radius: 20px;
    padding: 22px 24px; margin-bottom: 18px; background: var(--card);
    transition: box-shadow 0.3s;
  }
  .s-math { --accent: var(--math); }
  .s-rus  { --accent: var(--rus);  }
  .s-lit  { --accent: var(--lit);  }
  .s-eng  { --accent: var(--eng);  }
  .s-okr  { --accent: var(--okr);  }
  .subject-card:hover { box-shadow: 0 0 28px 2px color-mix(in srgb, var(--accent) 30%, transparent); }

  .subject-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .subject-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: var(--accent); }
  .subject-name { font-weight: 900; font-size: 17px; }

  .hw-text {
    font-size: 13px; line-height: 1.8; color: var(--text); white-space: pre-wrap;
    margin-bottom: 14px; padding: 12px 14px; background: var(--surface);
    border-radius: 12px; font-family: 'Space Mono', monospace;
  }
  .gdz-links { display: flex; flex-direction: column; gap: 8px; }
  .gdz-link {
    display: flex; align-items: center; gap: 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px;
    text-decoration: none; color: var(--text); font-size: 12px; font-weight: 700;
    font-family: 'Space Mono', monospace; transition: border-color 0.15s, background 0.15s; word-break: break-all;
  }
  .gdz-link:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
  .gdz-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--accent); }
  .gdz-label { color: var(--muted); font-size: 10px; flex-shrink: 0; }

  .section-divider { text-align: center; margin: 50px 0 30px; position: relative; }
  .section-divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border); }
  .section-divider span { position:relative; background:var(--bg); padding:0 16px; color:var(--muted); font-size:12px; font-family:'Space Mono',monospace; letter-spacing:1px; text-transform:uppercase; }

  .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:580px){ .calc-grid { grid-template-columns: 1fr; } }
  .calc-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:22px; display:flex; flex-direction:column; gap:14px; transition:box-shadow 0.3s; }
  .calc-card.math:focus-within { box-shadow: 0 0 32px 4px rgba(79,142,247,0.18); }
  .calc-card.rus:focus-within  { box-shadow: 0 0 32px 4px rgba(224,92,122,0.18); }
  .calc-header { display:flex; align-items:center; gap:10px; }
  .calc-icon { width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0; }
  .calc-card.math .calc-icon { background:rgba(79,142,247,0.15); }
  .calc-card.rus  .calc-icon { background:rgba(224,92,122,0.15); }
  .calc-title { font-weight:900; font-size:15px; }
  .calc-sub   { font-size:11px; color:var(--muted); font-weight:600; }
  textarea { width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;padding:10px 12px;resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s;line-height:1.6; }
  .calc-card.math textarea:focus { border-color:var(--math); }
  .calc-card.rus  textarea:focus { border-color:var(--rus); }
  textarea::placeholder { color:var(--muted); }
  button.go { width:100%;padding:11px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;cursor:pointer;transition:opacity 0.15s,transform 0.1s; }
  button.go:active { transform:scale(0.97);opacity:0.85; }
  .calc-card.math button.go { background:var(--math);color:#fff; }
  .calc-card.rus  button.go { background:var(--rus); color:#fff; }
  .calc-results { display:flex;flex-direction:column;gap:7px; }
  .calc-result-item { display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;text-decoration:none;color:var(--text);font-size:11px;font-weight:700;font-family:'Space Mono',monospace;transition:border-color 0.15s,background 0.15s;word-break:break-all; }
  .calc-card.math .calc-result-item:hover { border-color:var(--math);background:rgba(79,142,247,0.07); }
  .calc-card.rus  .calc-result-item:hover { border-color:var(--rus); background:rgba(224,92,122,0.07); }
  .calc-rdot { width:7px;height:7px;border-radius:50%;flex-shrink:0; }
  .calc-card.math .calc-rdot { background:var(--math); }
  .calc-card.rus  .calc-rdot { background:var(--rus); }
  .calc-rlabel { color:var(--muted);font-size:10px;flex-shrink:0; }
  .empty-note { color:var(--muted);font-size:11px;text-align:center;padding:4px 0; }
  .error-note { color:#e05c5c;font-size:11px;padding:4px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">4Б · Домашнее задание</div>
    <h1>Домашка 📚</h1>
    <div id="hw-date">Загрузка...</div>
  </header>
  <div id="hw-list"></div>

  <div class="section-divider"><span>ГДЗ калькулятор</span></div>
  <div class="calc-grid">
    <div class="calc-card math">
      <div class="calc-header">
        <div class="calc-icon">➕</div>
        <div><div class="calc-title">Математика</div><div class="calc-sub">Моро, 4 класс</div></div>
      </div>
      <textarea id="calc-math" placeholder="стр 78 №161, стр83 №169"></textarea>
      <button class="go" onclick="calcGen('math')">Дать план</button>
      <div class="calc-results" id="calc-math-results"></div>
    </div>
    <div class="calc-card rus">
      <div class="calc-header">
        <div class="calc-icon">📖</div>
        <div><div class="calc-title">Русский язык</div><div class="calc-sub">Канакина, 4 класс</div></div>
      </div>
      <textarea id="calc-rus" placeholder="стр 45 упр 3, с.50 у.12"></textarea>
      <button class="go" onclick="calcGen('rus')">Дать план</button>
      <div class="calc-results" id="calc-rus-results"></div>
    </div>
  </div>
</div>

<script>
const GDZ = {
  math:   p => `https://gdz-raketa.ru/matematika/4-klass/moro-uchebnik/2-chast-stranica-${p}/`,
  rus:    p => `https://gdz-raketa.ru/russkiy-yazyk/4-klass/uchebnik-kanakina/2-chast-stranitsa-${p}/`,
  okr_rt: p => `https://gdz-raketa.ru/okruzhayushchiy-mir/4-klass/rabochaya-tetrad-pleshakov/2-chast-stranica-${p}/`,
};
const SUBJECT_META = {
  math: { label:'Математика',     cls:'s-math', icon:'➕', gdz:'math' },
  rus:  { label:'Русский язык',   cls:'s-rus',  icon:'📖', gdz:'rus'  },
  lit:  { label:'Литература',     cls:'s-lit',  icon:'📕', gdz:null   },
  eng:  { label:'Английский',     cls:'s-eng',  icon:'🇬🇧', gdz:null  },
  okr:  { label:'Окружающий мир', cls:'s-okr',  icon:'🌍', gdz:'okr'  },
};

async function loadHomework() {
  try {
    const r = await fetch('homework.json?t=' + Date.now());
    const data = await r.json();
    renderHomework(data);
  } catch(e) {
    document.getElementById('hw-date').textContent = 'Не удалось загрузить данные';
  }
}

function renderHomework(data) {
  const dateEl = document.getElementById('hw-date');
  const listEl = document.getElementById('hw-list');
  if (!data.date && (!data.subjects || !data.subjects.length)) {
    dateEl.textContent = '';
    listEl.innerHTML = '<div class="empty-state">Домашка ещё не добавлена 👀</div>';
    return;
  }
  dateEl.textContent = data.date || '';
  listEl.innerHTML = '';
  const allowed = ['math','rus','lit','eng','okr'];
  const subjects = (data.subjects||[]).filter(s => allowed.includes(s.id) && s.hw && s.hw.trim());
  if (!subjects.length) { listEl.innerHTML='<div class="empty-state">Домашки нет 🎉</div>'; return; }
  subjects.forEach(s => {
    const meta = SUBJECT_META[s.id];
    const card = document.createElement('div');
    card.className = `subject-card ${meta.cls}`;
    card.innerHTML = `
      <div class="subject-header">
        <div class="subject-dot"></div>
        <div class="subject-name">${meta.icon} ${meta.label}</div>
      </div>
      <div class="hw-text">${esc(s.hw.trim())}</div>
      <div class="gdz-links" id="gdz-${s.id}"></div>`;
    listEl.appendChild(card);
    buildGdz(s, meta, document.getElementById(`gdz-${s.id}`));
  });
}

function buildGdz(s, meta, el) {
  const links = [];
  if (meta.gdz === 'math' || meta.gdz === 'rus') {
    parsePages(s.hw).forEach(p => links.push({ url: GDZ[meta.gdz](p), label:`стр. ${p}` }));
  }
  if (meta.gdz === 'okr') {
    parseRtPages(s.hw).forEach(p => links.push({ url: GDZ.okr_rt(p), label:`р.т. стр. ${p}` }));
  }
  links.forEach(({ url, label }) => {
    const a = document.createElement('a');
    a.href=url; a.target='_blank'; a.rel='noopener'; a.className='gdz-link';
    a.innerHTML=`<div class="gdz-dot"></div><span class="gdz-label">${label}</span><span>${url.replace('https://','')}</span>`;
    el.appendChild(a);
  });
}

function parsePages(text) {
  let t = text.toLowerCase()
    .replace(/страниц[аы]?\.?/g,'стр.').replace(/\bс\s*\.\s*/g,'стр.')
    .replace(/\bстр\s*\.?\s*/g,'стр.').replace(/упражнени[ея]\.?/g,'упр.')
    .replace(/\bупр\s*\.?\s*/g,'упр.').replace(/№\s*/g,'упр.')
    .replace(/[,;]/g,' , ').replace(/\s+/g,' ');
  const tokens = t.split(/\s+/);
  const set = new Set(); let i=0;
  while (i<tokens.length) {
    const tok=tokens[i];
    if (tok==='стр.'&&i+1<tokens.length&&/^\d+$/.test(tokens[i+1])) { set.add(parseInt(tokens[i+1],10)); i+=2; continue; }
    if (/^\d+$/.test(tok)) {
      const num=parseInt(tok,10), prev=tokens[i-1]||'', next=tokens[i+1]||'';
      if (prev!=='упр.'&&prev!==','&&num>=1&&num<=250) {
        if (next==='упр.'||/^\d+$/.test(next)||next===','||next==='') set.add(num);
      }
    }
    i++;
  }
  return [...set].sort((a,b)=>a-b);
}

function parseRtPages(text) {
  const set = new Set();
  text.split('\n').forEach(line => {
    const l=line.toLowerCase();
    if (!l.includes('р.т')&&!l.includes('рабочая тетр')) return;
    (l.match(/\d+/g)||[]).forEach(n=>{ const v=parseInt(n,10); if(v>=1&&v<=100) set.add(v); });
  });
  return [...set].sort((a,b)=>a-b);
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function calcGen(subject) {
  const input=document.getElementById(`calc-${subject}`).value.trim();
  const container=document.getElementById(`calc-${subject}-results`);
  container.innerHTML='';
  if (!input) { container.innerHTML='<div class="empty-note">Ничего не написано</div>'; return; }
  const pages=parsePages(input);
  if (!pages.length) { container.innerHTML='<div class="error-note">Не нашёл страниц</div>'; return; }
  const builder=subject==='math'?GDZ.math:GDZ.rus;
  pages.forEach(p=>{
    const a=document.createElement('a');
    a.href=builder(p); a.target='_blank'; a.rel='noopener'; a.className='calc-result-item';
    a.innerHTML=`<div class="calc-rdot"></div><span class="calc-rlabel">стр. ${p}</span><span>${builder(p).replace('https://','')}</span>`;
    container.appendChild(a);
  });
}
document.getElementById('calc-math').addEventListener('keydown',e=>{ if(e.key==='Enter'&&e.ctrlKey) calcGen('math'); });
document.getElementById('calc-rus').addEventListener('keydown', e=>{ if(e.key==='Enter'&&e.ctrlKey) calcGen('rus');  });

loadHomework();
</script>
</body>
</html>
